<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard CS — Marcio Carvalho de Sa | Terceiriza CS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#8B7CF7;--a2:#6C5CE7;--teal:#2DD4BF;--red:#F87171;--amber:#FBBF24;--green:#34D399;--blue:#60A5FA;--pink:#F472B6;--sky:#38BDF8;--cyan:#22D3EE;--orange:#FB923C;--gold:#FBBF24}
[data-theme="dark"]{--bg:#0f172a;--card:rgba(30,41,59,.85);--border:rgba(255,255,255,.08);--bh:rgba(139,124,247,.25);--shadow:rgba(0,0,0,.3);--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--chart-bg:rgba(15,23,42,.6);--track-bg:rgba(255,255,255,.04);--donut-hole:#0f172a;--login-bg:linear-gradient(135deg,#0a0e1a 0%,#1a1040 50%,#0a0e1a 100%)}
[data-theme="light"]{--bg:#f8fafc;--card:rgba(255,255,255,.85);--border:rgba(0,0,0,.08);--bh:rgba(139,124,247,.25);--shadow:rgba(0,0,0,.08);--t1:#0f172a;--t2:#475569;--t3:#94a3b8;--chart-bg:rgba(241,245,249,.6);--track-bg:rgba(0,0,0,.04);--donut-hole:#f8fafc;--login-bg:linear-gradient(135deg,#f8fafc 0%,#ede9fe 50%,#f8fafc 100%)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;transition:all .3s}
.wrap{max-width:1200px;margin:0 auto;padding:24px 20px 60px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr h1{font-size:18px;font-weight:700;letter-spacing:-.5px;line-height:1.2}
.hdr .sub{font-size:12px;color:var(--t2);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px}
.theme-toggle{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px;cursor:pointer}
.theme-btn{padding:5px 10px;border-radius:7px;border:none;background:transparent;color:var(--t3);font-size:14px;cursor:pointer;transition:all .2s}
.theme-btn.active{background:var(--accent);color:#fff}
.updated-badge{font-size:11px;color:var(--t2);font-family:'JetBrains Mono';background:var(--card);border:1px solid var(--border);padding:5px 10px;border-radius:10px}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--login-bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:56px 48px;text-align:center;max-width:420px;width:92%;box-shadow:0 24px 80px var(--shadow)}
.login-box h2{font-size:24px;font-weight:700;margin-bottom:4px}
.login-box p{font-size:14px;color:var(--t2);margin-bottom:32px}
.login-input{width:100%;padding:16px 20px;background:var(--bg);border:1px solid var(--border);border-radius:14px;color:var(--t1);font-family:'Inter';font-size:15px;outline:none;margin-bottom:14px}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-family:'Inter';font-weight:600;font-size:15px;cursor:pointer;transition:all .2s}
.login-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
#pwdError{color:var(--red);font-size:13px;margin-top:8px;display:none}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-spinner{width:48px;height:48px;border:4px solid var(--border);border-top:4px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:var(--t2)}

/* TABS */
.tab-nav{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px}
.tab-btn{padding:10px 18px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;white-space:nowrap}
.tab-btn:hover{border-color:var(--bh);color:var(--t1)}
.tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;border-color:transparent}
.tab-content{display:none}.tab-content.active{display:block}
.tab-full{display:inline}
.tab-short{display:none}
@media(max-width:640px){.tab-full{display:none}.tab-short{display:inline}}

/* FILTER BAR */
.filter-bar{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:24px;backdrop-filter:blur(20px)}
.filter-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.filter-title{font-size:14px;font-weight:700;color:var(--t1)}
.filter-actions{display:flex;gap:8px}
.filter-clear,.filter-apply{padding:8px 16px;border-radius:10px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.filter-clear{background:var(--track-bg);color:var(--t2)}.filter-clear:hover{color:var(--t1)}
.filter-apply{background:var(--accent);color:#fff}.filter-apply:hover{filter:brightness(1.1)}
.filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;align-items:center}
.filter-tag{font-size:11px;padding:4px 10px;border-radius:8px;background:rgba(139,124,247,.12);color:var(--accent);font-weight:600;display:flex;align-items:center;gap:4px}
.filter-tag.neutral{background:var(--track-bg);color:var(--t3)}
.filter-tag .x{cursor:pointer;opacity:.6;font-size:12px}.filter-tag .x:hover{opacity:1}
.results-badge{font-size:12px;color:var(--teal);font-weight:600;margin-left:8px}
.filter-date{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--t1);font-family:'Inter';font-size:12px;outline:none}
.filter-date:focus{border-color:var(--accent)}
.filter-date-row{display:flex;gap:8px}

/* MULTI-SELECT */
.ms-wrap{position:relative}
.ms-trigger{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--t2);cursor:pointer;transition:all .2s;user-select:none}
.ms-trigger.open{border-color:var(--accent);color:var(--t1)}
.ms-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:6px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 12px 36px var(--shadow);backdrop-filter:blur(20px)}
.ms-dropdown.show{display:block}
.ms-selall{padding:6px 10px;font-size:11px;color:var(--accent);cursor:pointer;border-bottom:1px solid var(--border);margin-bottom:4px;font-weight:600}
.ms-option{padding:6px 10px;font-size:12px;color:var(--t2);cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:8px;transition:background .15s}
.ms-option:hover{background:var(--track-bg)}
.ms-option.selected{color:var(--t1);font-weight:600}
.ms-check{width:14px;height:14px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
.ms-option.selected .ms-check{background:var(--accent);border-color:var(--accent)}
.ms-option.selected .ms-check::after{content:'';width:6px;height:6px;background:#fff;border-radius:2px}

/* SECTIONS */
.sec{font-size:16px;text-transform:uppercase;letter-spacing:2px;color:var(--t1);font-weight:700;margin:28px 0 18px;display:flex;align-items:center;gap:12px;padding:12px 16px;border-left:4px solid var(--accent);background:rgba(139,124,247,.08);border-radius:8px}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:8px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px 20px;transition:all .3s;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.kpi:hover{transform:translateY(-2px);border-color:var(--bh);box-shadow:0 12px 36px var(--shadow)}
.kpi-bar{height:4px;border-radius:2px;position:absolute;top:0;left:0;right:0}
.kpi-l{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;font-weight:500;margin-bottom:10px}
.kpi-v{font-size:28px;font-weight:700;font-family:'JetBrains Mono';line-height:1;letter-spacing:-1px}
.kpi-s{font-size:12px;color:var(--t3);margin-top:8px;font-family:'JetBrains Mono'}

/* GRIDS */
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:8px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:8px}
.g5{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:8px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;backdrop-filter:blur(20px);transition:all .3s}
.card:hover{border-color:var(--bh);box-shadow:0 8px 32px var(--shadow)}
.card h3{font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.card .d{font-size:12px;color:var(--t3);margin-bottom:16px}

/* HORIZONTAL BARS */
.hbar-area{display:flex;flex-direction:column;gap:12px}
.hbar-row{display:flex;align-items:center;gap:10px}
.hbar-lbl{font-size:12px;font-weight:600;min-width:120px;text-align:right;color:var(--t2)}
.hbar-track{flex:1;height:28px;background:var(--track-bg);border-radius:8px;overflow:hidden;position:relative}
.hbar-fill{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:700;color:#fff;font-family:'JetBrains Mono';transition:width 1s ease;min-width:32px}

/* DONUT */
.donut-area{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:16px}
.donut-ring{width:160px;height:160px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.donut-center{text-align:center}
.donut-v{font-size:20px;font-weight:700;font-family:'JetBrains Mono'}
.donut-sub{font-size:10px;color:var(--t3)}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.donut-legend span{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2)}
.donut-legend i{width:10px;height:10px;border-radius:3px;display:inline-block;flex-shrink:0}

/* CHART BARS */
.chart{display:flex;flex-direction:column;align-items:center}.chart-bars{display:flex;align-items:flex-end;gap:6px;height:200px;width:100%;justify-content:center}
.bar{position:relative;flex:1;max-width:40px;border-radius:6px 6px 0 0;min-height:4px;cursor:pointer;transition:height .5s ease}
.chart-labels{display:flex;width:100%;justify-content:center;gap:6px;margin-top:8px}.chart-lbl{font-size:10px;color:var(--t3);text-align:center;flex:1;max-width:40px}

/* FUNIL */
.ft-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.ft-row:last-child{border:none}
.ft-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;min-width:130px}
.ft-qty{font-size:14px;font-weight:700;font-family:'JetBrains Mono';min-width:50px;text-align:right}
.ft-pct{font-size:12px;color:var(--t3);font-family:'JetBrains Mono'}

/* PROGRESS BARS */
.prog-area{display:flex;flex-direction:column;align-items:center}
.prog-bars{display:flex;align-items:flex-end;gap:4px;height:180px;width:100%;justify-content:center}
.prog-bar{position:relative;flex:1;max-width:32px;border-radius:4px 4px 0 0;min-height:4px;cursor:pointer;transition:height .5s}
.prog-pct{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;font-family:'JetBrains Mono';color:var(--t3);white-space:nowrap}
.prog-labels{display:flex;width:100%;justify-content:center;gap:4px;margin-top:6px}
.prog-lbl{font-size:9px;color:var(--t3);text-align:center;flex:1;max-width:32px}

/* RETENTION BAR */
.retention-bar{display:flex;height:36px;border-radius:10px;overflow:hidden;margin-top:12px}
.retention-fill{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;font-family:'JetBrains Mono';transition:width 1s}

/* CROSS-SELL */
.rc{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;transition:all .3s}
.rc:hover{border-color:var(--bh)}
.rc h3{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rc-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.rc-badge.conv{background:rgba(139,124,247,.12);color:var(--accent)}
.rc-badge.perf{background:rgba(45,212,191,.12);color:var(--teal)}
.rc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.rc-row:last-child{border:none}
.rc-l{font-size:13px;color:var(--t2)}
.rc-v{font-size:16px;font-weight:700;font-family:'JetBrains Mono'}
.rc-potencial{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.15);border-radius:12px;padding:12px;margin-top:12px;display:flex;justify-content:space-between;align-items:center}
.rc-alert{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:12px;color:var(--green);font-weight:600}

/* INSIGHTS */
.ins-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:8px}
.ins{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all .3s}
.ins:hover{border-color:var(--bh)}
.ins.w{border-left:4px solid var(--amber)}
.ins.ok{border-left:4px solid var(--green)}
.ins.i{border-left:4px solid var(--accent)}
.ins-t{font-size:13px;font-weight:700;margin-bottom:4px}
.ins-p{font-size:12px;color:var(--t2);line-height:1.5}

/* TABLE */
.mini-table{width:100%;border-collapse:collapse;margin-top:12px}
.mini-table th{text-align:left;font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;border-bottom:1px solid var(--border)}
.mini-table td{font-size:12px;padding:8px;border-bottom:1px solid var(--border);color:var(--t2)}
.mini-table td:first-child{font-weight:600;color:var(--t1)}
.mini-table .mono{font-family:'JetBrains Mono';font-weight:600}
.pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600}
.pill.high{background:rgba(52,211,153,.12);color:var(--green)}
.pill.med{background:rgba(251,191,36,.12);color:var(--amber)}
.pill.low{background:rgba(248,113,113,.12);color:var(--red)}

/* FOOTER */
.footer{text-align:center;margin-top:40px;padding:20px;font-size:12px;color:var(--t3);border-top:1px solid var(--border)}

@media(max-width:640px){.kpis{grid-template-columns:1fr 1fr}.g2,.g3,.g5,.ins-g{grid-template-columns:1fr}.kpi-v{font-size:22px}.hbar-lbl{min-width:80px;font-size:11px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:48px;margin-bottom:20px">📊</div>
    <h2>Dashboard CS</h2>
    <p>Marcio Carvalho de Sa · Terceiriza CS</p>
    <div style="position:relative"><input class="login-input" type="password" id="pwdInput" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')doLogin()" style="padding-right:48px"><button onclick="togglePwd()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--t3)"><span id="eyeOpen" style="display:none">👁️</span><span id="eyeClosed">👁️‍🗨️</span></button></div>
    <div id="pwdError">Senha incorreta</div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div><div class="loading-text">Carregando dados...</div></div>

<!-- MAIN -->
<div class="wrap" id="mainWrap" style="display:none">
  <div class="hdr">
    <div class="hdr-left">
      <div style="width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">📊</div>
      <div><h1>Dashboard CS</h1><div class="sub">Marcio Carvalho de Sa · Terceiriza CS</div></div>
    </div>
    <div class="hdr-right">
      <div class="theme-toggle" onclick="toggleTheme()">
        <button class="theme-btn" id="btnLight">☀️</button>
        <button class="theme-btn active" id="btnDark">🌙</button>
      </div>
      <span class="updated-badge" id="badgeUpdated"></span>
    </div>
  </div>

  <!-- TABS -->
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('geral',this)"><span class="tab-full">Visao Geral</span><span class="tab-short">Geral</span></button>
    <button class="tab-btn" onclick="switchTab('engajamento',this)"><span class="tab-full">Engajamento do Aluno</span><span class="tab-short">Engajamento</span></button>
    <button class="tab-btn" onclick="switchTab('oportunidade',this)"><span class="tab-full">Oportunidade de Compra</span><span class="tab-short">Oportunidade</span></button>
    <button class="tab-btn" onclick="switchTab('gps',this)"><span class="tab-full">GPS</span><span class="tab-short">GPS</span></button>
  </nav>

  <!-- FILTROS -->
  <div class="filter-bar">
    <div class="filter-header">
      <span class="filter-title">Filtros</span>
      <div class="filter-actions">
        <button class="filter-clear" onclick="resetFilters()">Limpar filtros</button>
        <button class="filter-apply" onclick="applyFilters()">Aplicar</button>
      </div>
    </div>
    <div class="filter-grid">
      <div class="filter-group"><label class="filter-label">Produto (Nivel)</label><div class="ms-wrap" data-filter="nivel" id="fNivel"></div></div>
      <div class="filter-group"><label class="filter-label">Funil</label><div class="ms-wrap" data-filter="funil" id="fFunil"></div></div>
      <div class="filter-group"><label class="filter-label">Fonte</label><div class="ms-wrap" data-filter="fonte" id="fFonte"></div></div>
      <div class="filter-group"><label class="filter-label">Data de Compra</label><div class="filter-date-row"><input type="date" class="filter-date" id="fDe"><input type="date" class="filter-date" id="fAte"></div></div>
    </div>
    <div class="active-filters" id="tagsArea"><div class="filter-tag neutral">Nenhum filtro ativo — mostrando todos os dados</div></div>
  </div>

  <!-- TAB CONTENTS -->
  <div class="tab-content active" id="tab-geral"><div id="contentGeral"></div></div>
  <div class="tab-content" id="tab-engajamento"><div id="contentEngajamento"></div></div>
  <div class="tab-content" id="tab-oportunidade"><div id="contentOportunidade"></div></div>
  <div class="tab-content" id="tab-gps"><div id="contentGPS"></div></div>

  <div class="footer"><strong>Terceiriza CS</strong> · Dashboard · Marcio Carvalho de Sa</div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbxu_Sa-6ADkRaQ9oDgDYyu5_ft0s-maJlBtNIt9bBd3EHnlugS_V-WMYb3DDQfAToI0/exec';
const PWD='Marciodesa123';

// ========== INDEX MAP: THB/MCC arrays ==========
const T={NOME:0,EMAIL:1,TURMA:2,NIVEL:3,AULAS_COMP:4,TOTAL_AULAS:5,PRESENCA:6,CONCLUSAO:7,QTD_ACESSOS:8,PRIM_ACESSO:9,ULT_ACESSO:10,FUNIL:11,MOTIVO:12,DT_COMPRA:13,DT_VENC:14};
// CS arrays
const C={EVENTO:0,NOME:1,EMAIL:2,PRODUTO:3,PROG:4,AULAS_COMP:5,TOTAL_AULAS:6,PRIM_ACESSO:7,ULT_ACESSO:8,QTD_ACESSOS:9,DT_COMPRA:10,STATUS_CLUB:11,FUNIL:12};
// GPS arrays
const G={NOME:0,EMAIL:1,ASSUNTO:2,DATA:3};

let RAW={cs:[],thb:[],mcc:[],gps:[]};
let TODAY_MS=0;
let MERGED=[];
let GPS_SET=new Set();

const fmtN=n=>n.toLocaleString('pt-BR');
const fmtP=n=>n.toFixed(1).replace('.',',')+' %';
const rd=n=>Math.round(n*10)/10;
const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;

const funilOrder=['Nunca acessou','Consumiu pouco','Desengajado','Engajado','Verificar','Acessou mas nao consumiu'];
const funilColors=['var(--red)','var(--gold)','var(--orange)','var(--teal)','var(--sky)','var(--pink)'];

// ========== MULTI-SELECT ==========
function buildMS(id,values){const wrap=document.getElementById(id);let h='<div class="ms-trigger" onclick="toggleMS(this)">Todos</div><div class="ms-dropdown">';h+='<div class="ms-selall" onclick="toggleAll(this)">Marcar todos</div>';values.forEach(v=>{h+='<div class="ms-option" onclick="toggleOpt(this)" data-val="'+v+'"><div class="ms-check"></div>'+v+'</div>';});h+='</div>';wrap.innerHTML=h;}
function toggleMS(t){const dd=t.nextElementSibling;const o=dd.classList.contains('show');document.querySelectorAll('.ms-dropdown.show').forEach(d=>{d.classList.remove('show');d.previousElementSibling.classList.remove('open');});if(!o){dd.classList.add('show');t.classList.add('open');}}
function toggleOpt(o){o.classList.toggle('selected');updateTrigger(o.closest('.ms-wrap'));}
function toggleAll(el){const w=el.closest('.ms-wrap');const opts=w.querySelectorAll('.ms-option');const all=w.querySelectorAll('.ms-option.selected').length===opts.length;opts.forEach(o=>{if(all)o.classList.remove('selected');else o.classList.add('selected');});updateTrigger(w);}
function updateTrigger(w){const t=w.querySelector('.ms-trigger');const s=w.querySelectorAll('.ms-option.selected');if(!s.length){t.innerHTML='Todos';}else{const n=Array.from(s).map(o=>o.dataset.val);t.innerHTML=n.length<=2?n.join(', '):n.slice(0,2).join(', ')+' +'+(n.length-2);}}
function getMS(id){return Array.from(document.getElementById(id).querySelectorAll('.ms-option.selected')).map(o=>o.dataset.val);}
document.addEventListener('click',e=>{if(!e.target.closest('.ms-wrap'))document.querySelectorAll('.ms-dropdown.show').forEach(d=>{d.classList.remove('show');d.previousElementSibling.classList.remove('open');});});

// ========== HELPERS ==========
function kpiCard(bg,label,value,sub,color){return'<div class="kpi"><div class="kpi-bar" style="background:'+bg+'"></div><div class="kpi-l">'+label+'</div><div class="kpi-v" style="color:'+color+'">'+value+'</div>'+(sub?'<div class="kpi-s">'+sub+'</div>':'')+'</div>';}

function donutHTML(c1,deg,c2,cVal,cLbl,l1,n1,lc1,l2,n2,lc2){
  return'<div class="donut-ring" style="background:conic-gradient('+c1+' 0deg '+deg+'deg,'+c2+' '+deg+'deg 360deg)"><div style="width:120px;height:120px;background:var(--donut-hole);border-radius:50%;display:flex;align-items:center;justify-content:center"><div class="donut-center"><div class="donut-v" style="color:'+c1+'">'+cVal+'</div><div class="donut-sub">'+cLbl+'</div></div></div></div><div class="donut-legend"><span><i style="background:'+lc1+'"></i>'+l1+': '+n1+'</span><span><i style="background:'+lc2+'"></i>'+l2+': '+n2+'</span></div>';
}

function multiDonut(data,colors){
  const total=Object.values(data).reduce((a,b)=>a+b,0);
  if(!total)return'<div style="color:var(--t3);font-size:13px">Sem dados</div>';
  let grad='',leg='',deg=0;
  const keys=Object.keys(data).sort((a,b)=>data[b]-data[a]);
  keys.forEach(k=>{const pct=data[k]/total*100;const d=Math.round(pct/100*360);const c=colors[k]||'var(--t3)';grad+=c+' '+deg+'deg '+(deg+d)+'deg,';leg+='<span><i style="background:'+c+'"></i>'+k+' ('+data[k]+')</span>';deg+=d;});
  grad=grad.slice(0,-1);
  return'<div class="donut-ring" style="background:conic-gradient('+grad+')"><div style="width:120px;height:120px;background:var(--donut-hole);border-radius:50%;display:flex;align-items:center;justify-content:center"><div class="donut-center"><div class="donut-v">'+fmtN(total)+'</div><div class="donut-sub">alunos</div></div></div></div><div class="donut-legend">'+leg+'</div>';
}

// ========== MERGE DATA ==========
function mergeData(){
  MERGED=[];
  GPS_SET=new Set();
  RAW.gps.forEach(g=>{if(g[G.EMAIL])GPS_SET.add(g[G.EMAIL]);});

  RAW.thb.forEach(r=>{
    if(!r[T.NOME])return;
    MERGED.push({
      nome:r[T.NOME],email:r[T.EMAIL],turma:r[T.TURMA],nivel:r[T.NIVEL],
      aulasComp:r[T.AULAS_COMP],totalAulas:r[T.TOTAL_AULAS],presenca:r[T.PRESENCA],conclusao:r[T.CONCLUSAO],
      qtdAcessos:r[T.QTD_ACESSOS],primAcesso:r[T.PRIM_ACESSO],ultAcesso:r[T.ULT_ACESSO],
      funil:r[T.FUNIL],motivo:r[T.MOTIVO],dtCompra:r[T.DT_COMPRA],dtVenc:r[T.DT_VENC],
      fonte:'THB',temGPS:GPS_SET.has(r[T.EMAIL])
    });
  });

  RAW.mcc.forEach(r=>{
    if(!r[T.NOME])return;
    MERGED.push({
      nome:r[T.NOME],email:r[T.EMAIL],turma:r[T.TURMA],nivel:r[T.NIVEL],
      aulasComp:r[T.AULAS_COMP],totalAulas:r[T.TOTAL_AULAS],presenca:r[T.PRESENCA],conclusao:r[T.CONCLUSAO],
      qtdAcessos:r[T.QTD_ACESSOS],primAcesso:r[T.PRIM_ACESSO],ultAcesso:r[T.ULT_ACESSO],
      funil:r[T.FUNIL],motivo:r[T.MOTIVO],dtCompra:r[T.DT_COMPRA],dtVenc:r[T.DT_VENC],
      fonte:'MCC',temGPS:GPS_SET.has(r[T.EMAIL])
    });
  });
}

// ========== FILTERS ==========
function getFilteredRows(){
  const fn=getMS('fNivel'),ff=getMS('fFunil'),ffo=getMS('fFonte');
  const de=document.getElementById('fDe').value?new Date(document.getElementById('fDe').value).getTime():null;
  const ate=document.getElementById('fAte').value?new Date(document.getElementById('fAte').value+'T23:59:59').getTime():null;
  return MERGED.filter(r=>{
    if(fn.length&&!fn.includes(r.nivel))return false;
    if(ff.length&&!ff.includes(r.funil))return false;
    if(ffo.length&&!ffo.includes(r.fonte))return false;
    if(de&&r.dtCompra&&r.dtCompra<de)return false;
    if(ate&&r.dtCompra&&r.dtCompra>ate)return false;
    return true;
  });
}
function applyFilters(){
  const rows=getFilteredRows();
  const tags=[];
  getMS('fNivel').forEach(v=>tags.push(v));getMS('fFunil').forEach(v=>tags.push(v));getMS('fFonte').forEach(v=>tags.push(v));
  if(document.getElementById('fDe').value)tags.push('De: '+document.getElementById('fDe').value);
  if(document.getElementById('fAte').value)tags.push('Ate: '+document.getElementById('fAte').value);
  const area=document.getElementById('tagsArea');
  if(!tags.length){area.innerHTML='<div class="filter-tag neutral">Nenhum filtro ativo — mostrando todos os dados</div>';}
  else{area.innerHTML=tags.map(t=>'<div class="filter-tag">'+t+' <span class="x" onclick="this.parentElement.remove()">x</span></div>').join('')+'<span class="results-badge">-> '+fmtN(rows.length)+' registros filtrados</span>';}
  renderAll(rows);
}
function resetFilters(){
  document.querySelectorAll('.ms-option.selected').forEach(o=>o.classList.remove('selected'));
  document.querySelectorAll('.ms-trigger').forEach(t=>t.innerHTML='Todos');
  document.querySelectorAll('.filter-date').forEach(d=>d.value='');
  document.getElementById('tagsArea').innerHTML='<div class="filter-tag neutral">Nenhum filtro ativo — mostrando todos os dados</div>';
  renderAll(MERGED);
}

// ========== AGGREGATE ==========
function aggregate(rows){
  const a={total:rows.length,funil:{},faixaProg:{},niveis:{},fontes:{},presVals:[],concVals:[],
    comAcesso:0,semAcesso:0,faixaDias:{},comGPS:0,semGPS:0,
    aulasComp:[],totalAulas:[],turmas:{}};
  rows.forEach(r=>{
    if(r.funil)a.funil[r.funil]=(a.funil[r.funil]||0)+1;
    if(r.nivel)a.niveis[r.nivel]=(a.niveis[r.nivel]||0)+1;
    a.fontes[r.fonte]=(a.fontes[r.fonte]||0)+1;
    if(r.turma)a.turmas[r.turma]=(a.turmas[r.turma]||0)+1;
    if(r.presenca!==null&&r.presenca!==undefined)a.presVals.push(r.presenca);
    if(r.conclusao!==null&&r.conclusao!==undefined)a.concVals.push(r.conclusao);
    if(r.aulasComp)a.aulasComp.push(r.aulasComp);
    if(r.totalAulas)a.totalAulas.push(r.totalAulas);
    if(r.primAcesso)a.comAcesso++;else a.semAcesso++;
    if(r.temGPS)a.comGPS++;else a.semGPS++;
    if(r.ultAcesso){
      const d=Math.floor((TODAY_MS-r.ultAcesso)/86400000);
      const fd=d<=14?'0-14d':d<=30?'15-30d':d<=60?'31-60d':'>60d';
      a.faixaDias[fd]=(a.faixaDias[fd]||0)+1;
    }
    if(r.presenca!==null&&r.presenca!==undefined){
      const p=r.presenca;
      const fp=p===0?'0':p<=10?'1-10':p<=20?'11-20':p<=30?'21-30':p<=40?'31-40':p<=50?'41-50':p<=60?'51-60':p<=70?'61-70':p<=80?'71-80':p<=90?'81-90':'91-100';
      a.faixaProg[fp]=(a.faixaProg[fp]||0)+1;
    }
  });
  return a;
}

// ========== RENDER ALL ==========
function renderAll(rows){
  const a=aggregate(rows);
  const avgPres=rd(avg(a.presVals));
  const avgConc=rd(avg(a.concVals));
  const pctAcesso=a.total>0?rd(a.comAcesso/a.total*100):0;
  const pctSemAcesso=a.total>0?rd(a.semAcesso/a.total*100):0;

  // ========== TAB 1: VISAO GERAL ==========
  let h='';
  h+='<div class="kpis">';
  h+=kpiCard('linear-gradient(90deg,var(--accent),var(--a2))','Total Registros',fmtN(a.total),'THB: '+(a.fontes.THB||0)+' · MCC: '+(a.fontes.MCC||0),'var(--a2)');
  h+=kpiCard('linear-gradient(90deg,var(--teal),var(--green))','Media Presenca',fmtP(avgPres),'','var(--teal)');
  h+=kpiCard('linear-gradient(90deg,var(--sky),var(--cyan))','Media Conclusao',fmtP(avgConc),'','var(--sky)');
  h+=kpiCard('linear-gradient(90deg,var(--red),var(--pink))','Nunca Acessaram',fmtP(pctSemAcesso),a.semAcesso+' alunos','var(--red)');
  h+='</div>';

  const emailsUnicos=new Set();
  rows.forEach(r=>{if(r.email)emailsUnicos.add(r.email);});
  h+='<div class="kpis" style="margin-top:16px">';
  h+=kpiCard('linear-gradient(90deg,var(--green),var(--teal))','Alunos Unicos (email)',fmtN(emailsUnicos.size),'em '+fmtN(a.total)+' registros','var(--green)');
  h+=kpiCard('linear-gradient(90deg,var(--gold),var(--orange))','Com GPS',fmtN(a.comGPS),fmtP(a.total>0?rd(a.comGPS/a.total*100):0)+' do total','var(--gold)');
  h+=kpiCard('linear-gradient(90deg,var(--accent),var(--pink))','Turmas',fmtN(Object.keys(a.turmas).length),'','var(--accent)');
  h+=kpiCard('linear-gradient(90deg,var(--blue),var(--sky))','Niveis',fmtN(Object.keys(a.niveis).length),'','var(--blue)');
  h+='</div>';

  // Distribuicao por Nivel
  h+='<div class="sec">Distribuicao por Produto (Nivel)</div>';
  h+='<div class="g2"><div class="card"><h3>Alunos por Nivel</h3><div class="d">Distribuicao do total de registros</div><div class="donut-area">'+multiDonut(a.niveis,nivelColors)+'</div></div>';
  h+='<div class="card"><h3>Detalhamento por Nivel</h3><div class="d">Quantidade e percentual</div><div class="hbar-area" style="height:auto;gap:10px">';
  const nKeys=Object.keys(a.niveis).sort((x,y)=>a.niveis[y]-a.niveis[x]);
  const mxN=Math.max(...nKeys.map(k=>a.niveis[k]),1);
  nKeys.forEach(k=>{
    const pct=a.total>0?(a.niveis[k]/a.total*100).toFixed(1):'0';
    h+='<div class="hbar-row"><span class="hbar-lbl">'+k+'</span><div class="hbar-track"><div class="hbar-fill" style="width:'+Math.round(a.niveis[k]/mxN*100)+'%;background:'+nivelColor(k)+'">'+a.niveis[k]+' ('+pct+'%)</div></div></div>';
  });
  h+='</div></div></div>';

  // Funil
  h+='<div class="sec">Jornada do Aluno (Funil)</div>';
  const fd=funilOrder.map(f=>a.funil[f]||0);const mxF=Math.max(...fd,1);
  const extraFunil=Object.keys(a.funil).filter(f=>!funilOrder.includes(f));
  h+='<div class="g2"><div class="card"><h3>Distribuicao do Funil</h3><div class="d">Classificacao por engajamento</div><div class="chart"><div class="chart-bars">';
  funilOrder.forEach((f,i)=>{const q=fd[i];const hh=Math.round(q/mxF*90);h+='<div class="bar" style="height:'+Math.max(hh,2)+'%;background:'+funilColors[i]+'"><span style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;font-family:JetBrains Mono;color:var(--t2)">'+q+'</span></div>';});
  h+='</div><div class="chart-labels">';funilOrder.forEach(f=>{h+='<div class="chart-lbl">'+f.replace('Acessou mas nao consumiu','Acessou s/ consumo')+'</div>';});
  h+='</div></div></div>';
  h+='<div class="card"><h3>Detalhamento do Funil</h3><div class="d">Quantidade e percentual por etapa</div>';
  funilOrder.forEach((f,i)=>{const q=fd[i];const pc=a.total>0?q/a.total*100:0;h+='<div class="ft-row"><span class="ft-tag" style="background:'+funilBg[i]+';color:'+funilColors[i]+'">'+f+'</span><span class="ft-qty">'+fmtN(q)+'</span><span class="ft-pct">'+pc.toFixed(1)+'%</span></div>';});
  extraFunil.forEach(f=>{const q=a.funil[f];const pc=a.total>0?q/a.total*100:0;h+='<div class="ft-row"><span class="ft-tag" style="background:rgba(139,124,247,.12);color:var(--accent)">'+f+'</span><span class="ft-qty">'+fmtN(q)+'</span><span class="ft-pct">'+pc.toFixed(1)+'%</span></div>';});
  h+='</div></div>';

  // THB vs MCC
  h+='<div class="sec">THB vs MCC</div>';
  h+='<div class="g2">';
  const thbRows=rows.filter(r=>r.fonte==='THB');
  const mccRows=rows.filter(r=>r.fonte==='MCC');
  const avgPresTHB=rd(avg(thbRows.map(r=>r.presenca).filter(v=>v!==null&&v!==undefined)));
  const avgPresMCC=rd(avg(mccRows.map(r=>r.presenca).filter(v=>v!==null&&v!==undefined)));
  const avgConcTHB=rd(avg(thbRows.map(r=>r.conclusao).filter(v=>v!==null&&v!==undefined)));
  const avgConcMCC=rd(avg(mccRows.map(r=>r.conclusao).filter(v=>v!==null&&v!==undefined)));
  h+='<div class="card"><h3>Time Holding Brasil (THB)</h3><div class="d">'+fmtN(thbRows.length)+' registros</div>';
  h+='<div class="hbar-area" style="gap:12px">';
  h+='<div class="hbar-row"><span class="hbar-lbl">Presenca</span><div class="hbar-track"><div class="hbar-fill" style="width:'+Math.max(avgPresTHB,2)+'%;background:var(--accent)">'+fmtP(avgPresTHB)+'</div></div></div>';
  h+='<div class="hbar-row"><span class="hbar-lbl">Conclusao</span><div class="hbar-track"><div class="hbar-fill" style="width:'+Math.max(avgConcTHB,2)+'%;background:var(--teal)">'+fmtP(avgConcTHB)+'</div></div></div>';
  h+='</div></div>';
  h+='<div class="card"><h3>Mentoria Captacao Clientes (MCC)</h3><div class="d">'+fmtN(mccRows.length)+' registros</div>';
  h+='<div class="hbar-area" style="gap:12px">';
  h+='<div class="hbar-row"><span class="hbar-lbl">Presenca</span><div class="hbar-track"><div class="hbar-fill" style="width:'+Math.max(avgPresMCC,2)+'%;background:var(--accent)">'+fmtP(avgPresMCC)+'</div></div></div>';
  h+='<div class="hbar-row"><span class="hbar-lbl">Conclusao</span><div class="hbar-track"><div class="hbar-fill" style="width:'+Math.max(avgConcMCC,2)+'%;background:var(--teal)">'+fmtP(avgConcMCC)+'</div></div></div>';
  h+='</div></div></div>';

  // Insights
  h+='<div class="sec">Insights — Visao Geral</div><div class="ins-g">';
  if(pctSemAcesso>30)h+='<div class="ins w"><div class="ins-t">'+fmtP(pctSemAcesso)+' nunca acessaram</div><div class="ins-p">'+a.semAcesso+' de '+a.total+' registros sem primeiro acesso.</div></div>';
  const funilDeseng=(a.funil['Desengajado']||0)+(a.funil['Nunca acessou']||0);
  const pctDeseng=a.total>0?rd(funilDeseng/a.total*100):0;
  if(pctDeseng>40)h+='<div class="ins w"><div class="ins-t">'+fmtP(pctDeseng)+' em risco (Desengajado + Nunca acessou)</div><div class="ins-p">'+fmtN(funilDeseng)+' alunos precisam de acao de reativacao.</div></div>';
  const eng=a.funil['Engajado']||0;
  if(eng>0)h+='<div class="ins ok"><div class="ins-t">'+fmtN(eng)+' alunos engajados</div><div class="ins-p">'+fmtP(a.total>0?rd(eng/a.total*100):0)+' da base com bom engajamento.</div></div>';
  const pctGPS=a.total>0?rd(a.comGPS/a.total*100):0;
  h+='<div class="ins i"><div class="ins-t">'+fmtP(pctGPS)+' com GPS</div><div class="ins-p">'+fmtN(a.comGPS)+' registros com GPS vinculado. '+fmtN(a.semGPS)+' sem GPS.</div></div>';
  h+='</div>';
  document.getElementById('contentGeral').innerHTML=h;

  // ========== TAB 2: ENGAJAMENTO ==========
  let h2='';
  h2+='<div class="sec">Progresso & Presenca</div><div class="g2">';
  const pd=progOrder.map(f=>a.faixaProg[f]||0);const mxP=Math.max(...pd,1);
  h2+='<div class="card"><h3>Faixa de Presenca (%)</h3><div class="d">Distribuicao dos alunos por faixa de presenca</div><div class="prog-area"><div class="prog-bars">';
  progOrder.forEach((f,i)=>{const hh=Math.round(pd[i]/mxP*90);const pc=a.total>0?pd[i]/a.total*100:0;h2+='<div class="prog-bar" style="height:'+Math.max(hh,2)+'%;background:'+progColors[i]+'"><span class="prog-pct">'+pc.toFixed(1)+'%</span></div>';});
  h2+='</div><div class="prog-labels">';progOrder.forEach(f=>{h2+='<div class="prog-lbl">'+f+'%</div>';});h2+='</div></div></div>';

  const avgAulas=rd(avg(a.aulasComp));
  const avgTotal=rd(avg(a.totalAulas));
  const pctAulas=avgTotal>0?rd(avgAulas/avgTotal*100):0;
  h2+='<div class="card"><h3>Aulas Assistidas vs Total</h3><div class="d">Media geral de aulas</div>';
  h2+='<div class="hbar-area" style="height:auto;gap:20px">';
  h2+='<div class="hbar-row"><span class="hbar-lbl">Media Total</span><div class="hbar-track"><div class="hbar-fill" style="width:100%;background:var(--accent)">'+avgTotal.toFixed(0)+' aulas</div></div></div>';
  h2+='<div class="hbar-row"><span class="hbar-lbl">Media Assistida</span><div class="hbar-track"><div class="hbar-fill" style="width:'+Math.max(pctAulas,2)+'%;background:var(--teal)">'+avgAulas.toFixed(1)+' aulas ('+pctAulas+'%)</div></div></div>';

  // Presenca por Nivel
  h2+='<div class="sec">Presenca por Nivel</div>';
  h2+='<div class="card"><h3>Media de Presenca por Produto</h3><div class="d">Comparativo entre niveis</div><div class="hbar-area" style="height:auto;gap:12px">';
  const nivelPres={};
  rows.forEach(r=>{if(r.nivel&&r.presenca!==null&&r.presenca!==undefined){if(!nivelPres[r.nivel])nivelPres[r.nivel]=[];nivelPres[r.nivel].push(r.presenca);}});
  const npKeys=Object.keys(nivelPres).sort((a,b)=>avg(nivelPres[b])-avg(nivelPres[a]));
  npKeys.forEach(k=>{
    const m=rd(avg(nivelPres[k]));
    h2+='<div class="hbar-row"><span class="hbar-lbl">'+k+'</span><div class="hbar-track"><div class="hbar-fill" style="width:'+Math.max(m,2)+'%;background:'+nivelColor(k)+'">'+fmtP(m)+'</div></div></div>';
  });
  h2+='</div>';

  // Acesso
  h2+='<div class="sec">Analise de Acesso</div>';
  h2+='<div class="g2">';
  const degAc=Math.round(pctAcesso/100*360);
  h2+='<div class="card"><h3>Acesso ao Curso</h3><div class="d">Acessaram vs nunca acessaram</div><div class="donut-area">'+donutHTML('var(--teal)',degAc,'var(--red)',fmtP(pctAcesso),'acessou','Acessou',fmtN(a.comAcesso),'var(--teal)','Nunca',fmtN(a.semAcesso),'var(--red)')+'</div></div>';
  const d60=a.faixaDias['>60d']||0;const d31=a.faixaDias['31-60d']||0;const d15=a.faixaDias['15-30d']||0;const d0=a.faixaDias['0-14d']||0;
  const totalDias=d60+d31+d15+d0;
  const pD60=totalDias>0?rd(d60/totalDias*100):0;
  const degD=Math.round((totalDias>0?(totalDias-d60)/totalDias:1)*360);
  h2+='<div class="card"><h3>Dias sem Acesso</h3><div class="d">Distribuicao por faixa de inatividade</div><div class="donut-area">'+donutHTML('var(--sky)',degD,'var(--red)',fmtP(pD60),'>60 dias','<60d',fmtN(totalDias-d60),'var(--sky)','>60d',fmtN(d60),'var(--red)')+'</div></div>';
  h2+='</div>';

  // Top turmas
  h2+='<div class="sec">Turmas</div>';
  h2+='<div class="card"><h3>Top 15 Turmas</h3><div class="d">Por quantidade de alunos</div><div class="hbar-area" style="height:auto;gap:8px">';
  const tKeys=Object.keys(a.turmas).sort((x,y)=>a.turmas[y]-a.turmas[x]).slice(0,15);
  const mxT=tKeys.length?a.turmas[tKeys[0]]:1;
  tKeys.forEach(k=>{
    h2+='<div class="hbar-row"><span class="hbar-lbl">'+k+'</span><div class="hbar-track"><div class="hbar-fill" style="width:'+Math.round(a.turmas[k]/mxT*100)+'%;background:var(--accent)">'+a.turmas[k]+'</div></div></div>';
  });
  h2+='</div>';

  // Insights Engajamento
  h2+='<div class="sec">Insights — Engajamento</div><div class="ins-g">';
  if(pD60>30)h2+='<div class="ins w"><div class="ins-t">'+fmtP(pD60)+' inativos ha mais de 60 dias</div><div class="ins-p">'+d60+' alunos nao acessam ha mais de 60 dias.</div></div>';
  if(avgPres<30)h2+='<div class="ins w"><div class="ins-t">Presenca media baixa: '+fmtP(avgPres)+'</div><div class="ins-p">Acoes de engajamento urgentes necessarias.</div></div>';
  if(avgConc>50)h2+='<div class="ins ok"><div class="ins-t">Conclusao media: '+fmtP(avgConc)+'</div><div class="ins-p">Base com boa taxa de conclusao de conteudo.</div></div>';
  if(npKeys.length>=2){
    const best=npKeys[0],worst=npKeys[npKeys.length-1];
    h2+='<div class="ins i"><div class="ins-t">Gap: '+best+' vs '+worst+'</div><div class="ins-p">'+best+' lidera com '+fmtP(rd(avg(nivelPres[best])))+' vs '+worst+' com '+fmtP(rd(avg(nivelPres[worst])))+'.</div></div>';
  }
  h2+='</div>';
  document.getElementById('contentEngajamento').innerHTML=h2;

  // ========== TAB 3: OPORTUNIDADE DE COMPRA ==========
  renderOportunidade(rows);

  // ========== TAB 4: GPS ==========
  renderGPS(rows);
}

// ========== OPORTUNIDADE DE COMPRA ==========
function renderOportunidade(rows){
  let h='';

  // CS Holding+ emails
  const csEmails=new Set();
  const csData={};
  RAW.cs.forEach(r=>{
    if(r[C.EVENTO]==='Holding+'&&r[C.EMAIL]){
      csEmails.add(r[C.EMAIL]);
      csData[r[C.EMAIL]]={prog:r[C.PROG],aulas:r[C.AULAS_COMP],total:r[C.TOTAL_AULAS],funil:r[C.FUNIL],statusClub:r[C.STATUS_CLUB]};
    }
  });

  // Holding Master emails (THB)
  const hmEmails=new Set();
  const hmData={};
  rows.forEach(r=>{
    if(r.nivel==='Holding Masters'||r.nivel==='Holding Masters (novos)'){
      hmEmails.add(r.email);
      hmData[r.email]={presenca:r.presenca,conclusao:r.conclusao,funil:r.funil,nivel:r.nivel};
    }
  });

  // Other nivel emails
  const otherNivelEmails={};
  rows.forEach(r=>{
    if(r.nivel&&r.nivel!=='Holding Masters'&&r.nivel!=='Holding Masters (novos)'){
      if(!otherNivelEmails[r.nivel])otherNivelEmails[r.nivel]=new Set();
      otherNivelEmails[r.nivel].add(r.email);
    }
  });

  // === Holding+ -> Holding Master ===
  const hpSomente=[];const hpComHM=[];
  csEmails.forEach(e=>{
    if(hmEmails.has(e))hpComHM.push(e);
    else hpSomente.push(e);
  });
  const hpTotal=csEmails.size;
  const hpConv=hpComHM.length;
  const hpPot=hpSomente.length;
  const pctConvHP=hpTotal>0?rd(hpConv/hpTotal*100):0;
  const avgProgHP=hpComHM.length?rd(avg(hpComHM.map(e=>csData[e]?csData[e].prog||0:0))):0;

  h+='<div class="sec">Holding+ -> Holding Master</div>';
  h+='<div class="kpis">';
  h+=kpiCard('linear-gradient(90deg,var(--accent),var(--a2))','Alunos Holding+',fmtN(hpTotal),'na planilha CS','var(--a2)');
  h+=kpiCard('linear-gradient(90deg,var(--teal),var(--green))','Ja tem Holding Master',fmtN(hpConv),fmtP(pctConvHP)+' de conversao','var(--teal)');
  h+=kpiCard('linear-gradient(90deg,var(--gold),var(--orange))','Potencial (so Holding+)',fmtN(hpPot),'oportunidade de upsell','var(--gold)');
  h+=kpiCard('linear-gradient(90deg,var(--red),var(--pink))','Prog. medio (convertidos)',fmtP(avgProgHP),'no Holding+','var(--accent)');
  h+='</div>';

  h+='<div class="g2">';
  h+='<div class="rc"><h3>Cross-sell Holding+ -> Holding Master <span class="rc-badge conv">Conversao</span></h3>';
  h+='<div class="rc-row"><span class="rc-l">Alunos Holding+ que tem Holding Master</span><span class="rc-v" style="color:var(--teal)">'+hpConv+'</span></div>';
  h+='<div class="rc-row"><span class="rc-l">Taxa de cross-sell</span><span class="rc-v" style="color:var(--teal)">'+fmtP(pctConvHP)+'</span></div>';
  h+='<div class="rc-potencial"><span class="rc-l">Potencial restante</span><span class="rc-v" style="color:var(--gold)">'+fmtN(hpPot)+' <small style="font-size:12px;font-weight:400;color:var(--t2)">('+fmtP(hpTotal>0?rd(hpPot/hpTotal*100):0)+')</small></span></div></div>';

  h+='<div class="rc" style="background:linear-gradient(135deg,var(--card) 0%,rgba(45,212,191,.04) 100%);border-color:rgba(45,212,191,.15)"><h3 style="color:var(--teal)">Perfil dos Convertidos <span class="rc-badge perf">Perfil</span></h3>';
  h+='<div class="rc-row"><span class="rc-l">Progresso medio no Holding+</span><span class="rc-v" style="color:var(--teal)">'+fmtP(avgProgHP)+'</span></div>';
  const avgPresConv=hpComHM.length?rd(avg(hpComHM.filter(e=>hmData[e]).map(e=>hmData[e].presenca||0))):0;
  h+='<div class="rc-row"><span class="rc-l">Presenca media no HM</span><span class="rc-v" style="color:var(--accent)">'+fmtP(avgPresConv)+'</span></div>';
  h+='</div></div>';

  // === Holding Master -> Outros Produtos ===
  h+='<div class="sec">Holding Master -> Outros Produtos</div>';
  const crossPaths=[];
  Object.keys(otherNivelEmails).forEach(nivel=>{
    const nSet=otherNivelEmails[nivel];
    let cross=0;
    hmEmails.forEach(e=>{if(nSet.has(e))cross++;});
    crossPaths.push({nivel,cross,pot:hmEmails.size-cross,total:hmEmails.size,nTotal:nSet.size,pct:hmEmails.size>0?rd(cross/hmEmails.size*100):0});
  });
  crossPaths.sort((a,b)=>b.pot-a.pot);

  if(crossPaths.length){
    h+='<div class="card"><h3>Oportunidades de Cross-sell</h3><div class="d">Alunos Holding Master que ainda nao tem outros produtos</div>';
    h+='<table class="mini-table"><thead><tr><th>Produto</th><th>Ja tem</th><th>Potencial</th><th>% Cross</th><th>Status</th></tr></thead><tbody>';
    crossPaths.forEach(cp=>{
      const cls=cp.pct>30?'high':cp.pct>10?'med':'low';
      h+='<tr><td>'+cp.nivel+'</td><td class="mono">'+cp.cross+'</td><td class="mono" style="color:var(--gold)">'+cp.pot+'</td><td class="mono">'+fmtP(cp.pct)+'</td><td><span class="pill '+cls+'">'+(cp.pct>30?'Alto':cp.pct>10?'Medio':'Baixo')+'</span></td></tr>';
    });
    h+='</tbody></table></div>';
  }

  // Insights
  h+='<div class="sec">Insights — Oportunidade</div><div class="ins-g">';
  if(hpPot>0)h+='<div class="ins i"><div class="ins-t">'+fmtN(hpPot)+' alunos so com Holding+</div><div class="ins-p">Oportunidade de upsell para Holding Master. '+fmtP(hpTotal>0?rd(hpPot/hpTotal*100):0)+' do total Holding+.</div></div>';
  const bestCross=crossPaths.find(c=>c.pot>50);
  if(bestCross)h+='<div class="ins i"><div class="ins-t">'+bestCross.nivel+': '+fmtN(bestCross.pot)+' potenciais</div><div class="ins-p">Maior oportunidade de cross-sell a partir do Holding Master.</div></div>';
  if(pctConvHP>50)h+='<div class="ins ok"><div class="ins-t">Boa conversao Holding+ -> HM: '+fmtP(pctConvHP)+'</div><div class="ins-p">Mais da metade dos Holding+ ja tem Holding Master.</div></div>';
  if(pctConvHP<20)h+='<div class="ins w"><div class="ins-t">Conversao baixa Holding+ -> HM: '+fmtP(pctConvHP)+'</div><div class="ins-p">Menos de 20% dos Holding+ migraram para Holding Master.</div></div>';
  h+='</div>';

  document.getElementById('contentOportunidade').innerHTML=h;
}

// ========== GPS ==========
function renderGPS(rows){
  let h='';
  const gpsData=RAW.gps;

  h+='<div class="kpis">';
  h+=kpiCard('linear-gradient(90deg,var(--accent),var(--a2))','Total GPS',fmtN(gpsData.length),'registros de GPS','var(--a2)');
  const gpsEmails=new Set();gpsData.forEach(g=>{if(g[G.EMAIL])gpsEmails.add(g[G.EMAIL]);});
  h+=kpiCard('linear-gradient(90deg,var(--teal),var(--green))','Emails Unicos',fmtN(gpsEmails.size),'com GPS','var(--teal)');
  const mergedEmails=new Set();rows.forEach(r=>{if(r.email)mergedEmails.add(r.email);});
  const gpsNaMerge=new Set();gpsEmails.forEach(e=>{if(mergedEmails.has(e))gpsNaMerge.add(e);});
  h+=kpiCard('linear-gradient(90deg,var(--green),var(--teal))','GPS + THB/MCC',fmtN(gpsNaMerge.size),'alunos com GPS e cursando','var(--green)');
  const gpsSemCurso=gpsEmails.size-gpsNaMerge.size;
  h+=kpiCard('linear-gradient(90deg,var(--gold),var(--orange))','GPS sem Curso',fmtN(gpsSemCurso),'tem GPS mas nao esta em THB/MCC','var(--gold)');
  h+='</div>';

  // GPS por mes
  h+='<div class="sec">GPS por Periodo</div>';
  const gpsMes={};
  gpsData.forEach(g=>{
    if(g[G.DATA]){
      const d=new Date(g[G.DATA]);
      const key=(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'/'+d.getFullYear();
      gpsMes[key]=(gpsMes[key]||0)+1;
    }
  });
  const mesKeys=Object.keys(gpsMes).sort();
  if(mesKeys.length){
    const mxGps=Math.max(...mesKeys.map(k=>gpsMes[k]),1);
    h+='<div class="card"><h3>GPS por Mes</h3><div class="d">Quantidade de GPS enviados por periodo</div><div class="chart"><div class="chart-bars">';
    mesKeys.forEach(k=>{const hh=Math.round(gpsMes[k]/mxGps*90);h+='<div class="bar" style="height:'+Math.max(hh,4)+'%;background:var(--accent)"><span style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;font-family:JetBrains Mono;color:var(--t2)">'+gpsMes[k]+'</span></div>';});
    h+='</div><div class="chart-labels">';mesKeys.forEach(k=>{h+='<div class="chart-lbl">'+k+'</div>';});
    h+='</div></div></div>';
  }

  // GPS por Nivel
  h+='<div class="sec">GPS por Nivel</div>';
  const gpsNivel={};
  rows.forEach(r=>{if(r.temGPS&&r.nivel)gpsNivel[r.nivel]=(gpsNivel[r.nivel]||0)+1;});
  const totalGpsNivel=Object.values(gpsNivel).reduce((s,v)=>s+v,0);
  if(totalGpsNivel>0){
    h+='<div class="g2"><div class="card"><h3>Distribuicao GPS por Nivel</h3><div class="d">Registros com GPS por produto</div><div class="donut-area">'+multiDonut(gpsNivel,nivelColors)+'</div></div>';
    h+='<div class="card"><h3>Taxa de GPS por Nivel</h3><div class="d">% de alunos com GPS em cada nivel</div><div class="hbar-area" style="height:auto;gap:10px">';
    const allNiveis={};
    rows.forEach(r=>{if(r.nivel)allNiveis[r.nivel]=(allNiveis[r.nivel]||0)+1;});
    const gnKeys=Object.keys(allNiveis).sort((a,b)=>{const pa=(gpsNivel[a]||0)/allNiveis[a];const pb=(gpsNivel[b]||0)/allNiveis[b];return pb-pa;});
    gnKeys.forEach(k=>{
      const taxa=allNiveis[k]>0?rd((gpsNivel[k]||0)/allNiveis[k]*100):0;
      h+='<div class="hbar-row"><span class="hbar-lbl">'+k+'</span><div class="hbar-track"><div class="hbar-fill" style="width:'+Math.max(taxa,2)+'%;background:'+nivelColor(k)+'">'+(gpsNivel[k]||0)+'/'+allNiveis[k]+' ('+fmtP(taxa)+')</div></div></div>';
    });
    h+='</div></div></div>';
  }

  // Insights GPS
  h+='<div class="sec">Insights — GPS</div><div class="ins-g">';
  const pctGPS=mergedEmails.size>0?rd(gpsNaMerge.size/mergedEmails.size*100):0;
  if(pctGPS<20)h+='<div class="ins w"><div class="ins-t">Apenas '+fmtP(pctGPS)+' dos alunos tem GPS</div><div class="ins-p">'+fmtN(gpsNaMerge.size)+' de '+fmtN(mergedEmails.size)+' alunos unicos. Oportunidade de expandir.</div></div>';
  if(gpsSemCurso>0)h+='<div class="ins i"><div class="ins-t">'+fmtN(gpsSemCurso)+' GPS sem vinculo com THB/MCC</div><div class="ins-p">Emails que receberam GPS mas nao estao na base de alunos.</div></div>';
  if(pctGPS>50)h+='<div class="ins ok"><div class="ins-t">Boa cobertura GPS: '+fmtP(pctGPS)+'</div><div class="ins-p">Mais da metade dos alunos ja tem GPS.</div></div>';
  h+='</div>';

  document.getElementById('contentGPS').innerHTML=h;
}

// ========== LOAD DATA ==========
async function loadData(){
  try{
    const r=await fetch(API_URL);const d=await r.json();
    if(d.error)throw new Error(d.error);
    RAW.cs=d.cs||[];RAW.thb=d.thb||[];RAW.mcc=d.mcc||[];RAW.gps=d.gps||[];
    TODAY_MS=d.todayMs;
    document.getElementById('badgeUpdated').textContent='Atualizado: '+d.atualizado;
    mergeData();
    const niveis=new Set();const funis=new Set();
    MERGED.forEach(r=>{if(r.nivel)niveis.add(r.nivel);if(r.funil)funis.add(r.funil);});
    buildMS('fNivel',[...niveis].sort());
    buildMS('fFunil',funilOrder.filter(f=>funis.has(f)).concat([...funis].filter(f=>!funilOrder.includes(f))));
    buildMS('fFonte',['THB','MCC']);
    renderAll(MERGED);
    document.getElementById('loadingOverlay').style.display='none';
    document.getElementById('mainWrap').style.display='block';
  }catch(e){
    document.getElementById('loadingOverlay').innerHTML='<div style="color:var(--red);padding:40px;text-align:center;font-size:18px">Erro ao carregar: '+e.message+'<br><br><small style="color:var(--t3)">Verifique se a URL da API esta configurada corretamente.</small></div>';
  }
}
</script>
